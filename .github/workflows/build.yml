name: Build RAPT

on:
  push:
    tags: ["v*"]

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Build linux + android, then package RAPT DLC via official distribute
  # ════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Package RAPT DLC
        run: make dist-rapt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapt-dlc
          path: output/renpy-*-rapt.*
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════
  # Release — create/update GitHub release from tag
  # ════════════════════════════════════════════════════════════════════════
  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rapt-dlc
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
